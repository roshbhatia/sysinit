name: rosh-spec-driven
version: 1
description: Rosh's opinionated OpenSpec workflow - proposal → specs → design → tasks, with extra authoring rules
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Non-goals**: When the change touches more than one capability, fill in a `### Non-goals` block under `## What Changes` listing the work explicitly NOT included. This rule is enforced by the rosh-spec-driven schema; omit only for trivially-scoped single-capability changes.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      **rosh-spec-driven rules** (apply before writing the proposal):

      1. **Reuse existing patterns.** Before drafting "What Changes", survey the repo for prior
         implementations of similar capabilities. Reference the closest existing module/file by
         path in the proposal and explicitly note what is being reused vs. introduced. If no
         existing pattern fits, state that explicitly. Inventing parallel infrastructure when an
         established pattern would work is a default-reject.
      2. **Plan for progressive rollout.** Every change MUST be shaped so it can land
         incrementally. Scope the proposal so each capability can be reviewed, built, and
         verified independently. Avoid all-or-nothing changes that flip many surfaces at once.
         If the change is genuinely atomic (cannot be split), say so in `Impact` and explain why.
      3. **Flag impactful actions up front.** In `Impact`, enumerate every action that mutates
         shared state, is hard to reverse, or requires user confirmation: `nh os switch`,
         `openspec archive`, `git push`, network writes, schema migrations, system config
         changes, vendored-content updates, removal of public surfaces. These become explicit
         human-verification checkpoints in `tasks.md`.
      4. **Note the gating signal.** If the change has a natural feature flag, kill switch,
         config toggle, or staged-rollout sequence, name it in `Impact` so design.md can build
         on it. For dotfiles work this is typically `nh os build` (verify) before
         `nh os switch` (apply).

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.
      - **rosh-spec-driven rule**: Every requirement MUST include at least one negative scenario describing what happens when an unexpected condition occurs (`WHEN <unexpected condition> THEN <error/rejection>`). Positive scenarios alone are insufficient.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:
      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      #### Scenario: Export with malformed data
      - **WHEN** user data contains values that violate the CSV schema
      - **THEN** the system rejects the export and reports the offending row

      ## REMOVED Requirements

      ### Requirement: Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders. **rosh-spec-driven rule**: name the existing patterns/files being extended or paralleled. Cite paths. If introducing a new pattern, justify why the closest existing one was insufficient.
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). **rosh-spec-driven rule**: Each entry under Decisions MUST list at least one alternative considered and the explicit reason it was rejected. A decision without recorded alternatives is not a decision; it's an assumption.
      - **Rollout & Gating**: **rosh-spec-driven rule**: REQUIRED section. Describe the sequenced rollout — which slice ships first, what gate must pass before the next slice (build green, manual smoke test, user confirmation, etc.), and where the kill switch is if something goes wrong. For dotfiles work, the default gate sequence is: edit → `nix flake check` → `nh os build` (no system change) → user spot-check → `nh os switch`. Deviations from this sequence MUST be called out. Name any feature flag, config toggle, or capability gate that scopes the rollout.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation. Risks that map to human-verification checkpoints in `tasks.md` MUST be flagged here.
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable). **rosh-spec-driven rule**: Every step that mutates shared state, is hard to reverse, or requires elevated permissions MUST be preceded by a verification step and followed by a confirmation step. Single-line "run X" entries for impactful actions are insufficient.
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)
      - **rosh-spec-driven rule**: When the change spans more than one capability, group tasks under explicit phase headings (`## 1. Phase name`, `## 2. Phase name`, ...). Each phase MUST correspond to a coherent vertical slice that could in principle be reviewed or shipped independently.
      - **rosh-spec-driven rule — human verification before impactful actions**: Any task that performs an action with non-trivial blast radius MUST be preceded by a verification task and followed by a confirmation task. Impactful actions include (non-exhaustive):
        - `nh os switch` / `nh darwin switch` (mutates the live system)
        - `git push`, especially to `main` or any shared branch
        - `openspec archive` (irreversibly moves a change out of the active set)
        - Schema fork or migration steps
        - Removal/deletion of files outside the working scratch space
        - Network writes (POST/PUT/DELETE to external services)
        - Updates to vendored upstream content (fetcher hash bumps, etc.)
        - `nix fmt` / formatter sweeps that touch many files at once
      - For each such task, the structure MUST be:
        - `- [ ] X.N Verify: <preconditions, e.g., nix flake check passes, nh os build succeeds, diff reviewed>`
        - `- [ ] X.N+1 Apply: <impactful action>`
        - `- [ ] X.N+2 Confirm: <postconditions, e.g., expected files exist, user spot-checks, drift script reports OK>`
      - **rosh-spec-driven rule — reuse first**: For each task that introduces a new module/file, the description SHOULD reference the existing pattern it follows (cite a file path) or explicitly note this is a new pattern (with justification carried from design.md).

      Example:
      ```
      ## 1. Setup

      - [ ] 1.1 Create new module structure (follows `modules/home/programs/llm/skills/` layout)
      - [ ] 1.2 Add dependencies to package.json

      ## 2. Core Implementation

      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities

      ## 3. Rollout

      - [ ] 3.1 Verify: `nix flake check` + `nh os build` green; review `git diff`
      - [ ] 3.2 Apply: `nh os switch`
      - [ ] 3.3 Confirm: exported file appears at expected path; user spot-checks
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable — you know when it's done.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
