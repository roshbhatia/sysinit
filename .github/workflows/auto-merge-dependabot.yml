name: Auto-merge Dependabot PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      # Squash + delete branch — no branch protection or required checks
      # gate this repo, so plain `gh pr merge` is sufficient. If checks
      # are added later, swap `--squash` for `--auto --squash` so the
      # merge waits for them.
      #
      # PRs that modify workflow files require the `workflow` PAT scope —
      # GITHUB_TOKEN alone can't merge those. If WORKFLOWS_PAT is set
      # (a PAT with `repo` + `workflow` scopes), use it; otherwise fall
      # back to GITHUB_TOKEN and accept that workflow-bump PRs need to be
      # merged manually.
      #
      # To create the PAT: gh auth refresh -s workflow then store via
      #   gh secret set WORKFLOWS_PAT --repo roshbhatia/sysinit
      - name: Merge Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.WORKFLOWS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          pr="${{ github.event.pull_request.number }}"
          echo "Merging Dependabot PR #${pr}"
          sleep 5
          gh pr merge "${pr}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
