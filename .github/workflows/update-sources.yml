name: Update sources

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v17

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update nvfetcher sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
        run: |
          nix run nixpkgs#nvfetcher -- -c nvfetcher.toml -o _sources --keep-going

      - name: Update flake inputs
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
        run: |
          nix flake update

      - name: Update Go vendorHash values
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
        run: |
          ./hack/update-vendor-hash.sh

      - name: Update claude-code
        run: |
          ./hack/update-claude-code.sh

      - name: Update openspec
        run: |
          ./hack/update-openspec.sh

      - name: Update amp-cli
        run: |
          ./hack/update-amp-cli.sh

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-sources
          delete-branch: true
          title: "chore: update nvfetcher sources and flake inputs"
          commit-message: "chore: update nvfetcher sources and flake inputs"
          body: |
            Automated update:
            - Regenerated `_sources/generated.nix` via nvfetcher
            - Updated `flake.lock` via `nix flake update`
            - Auto-updated Go `vendorHash` values
          labels: automated,dependencies

      # Merge the automation PR directly. No branch protection, no required
      # checks, so there's nothing for `gh pr merge --auto` to wait on —
      # just squash and delete the branch. Squash keeps the linear history
      # the user prefers on main.
      - name: Merge automation PR
        if: steps.cpr.outputs.pull-request-operation != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr="${{ steps.cpr.outputs.pull-request-number }}"
          if [ -z "${pr}" ]; then
            echo "No PR number from create-pull-request step; nothing to merge."
            exit 0
          fi
          echo "Merging PR #${pr} (operation: ${{ steps.cpr.outputs.pull-request-operation }})"
          # Brief settle for GitHub to compute mergeability after the push.
          sleep 5
          gh pr merge "${pr}" --squash --delete-branch
